<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Seaside Illustration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#d9d9d9;
    overflow:hidden;
}

/* Main Scene */
.scene{
    position:relative;
    width:900px;
    height:500px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:
        0 20px 45px rgba(0,0,0,.18),
        0 8px 18px rgba(0,0,0,.12);
}

/* Sky */
.sky{
    position:absolute;
    inset:0;
    height:65%;
    background:#0b2d6b;
}

/* Sea */
.sea{
    position:absolute;
    bottom:0;
    width:100%;
    height:35%;
    background:#1c4f8f;
}

/* Horizon Glow */
.horizon{
    position:absolute;
    top:64%;
    left:0;
    width:100%;
    height:8px;
    background:rgba(255,255,220,.15);
    box-shadow:0 0 18px rgba(255,255,220,.15);
}

/* Stars */
.star{
    position:absolute;
    background:#fff;
    border-radius:50%;
}

/* Moon */
.moon{
    position:absolute;
    width:72px;
    height:72px;
    left:95px;
    top:65px;
    border-radius:50%;
    background:#fff4c4;
    box-shadow:
        0 0 18px rgba(255,244,196,.6),
        0 0 40px rgba(255,244,196,.25);
}

/* Birds */
.bird{
    position:absolute;
    width:18px;
    height:9px;
}

.bird::before,
.bird::after{
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    border-top:2px solid #000;
    border-radius:50%;
}

.bird::before{
    left:0;
    transform:rotate(-15deg);
}

.bird::after{
    right:0;
    transform:rotate(15deg);
}

.b1{
    top:120px;
    left:215px;
    transform:scale(.9);
}

.b2{
    top:145px;
    left:270px;
    transform:scale(1.2);
}

.b3{
    top:105px;
    left:320px;
    transform:scale(.75);
}

/* Moon Reflection */
.reflection{
    position:absolute;
    left:120px;
    bottom:22px;
    width:140px;
    height:170px;
}

.reflection span{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,244,196,.28);
    border-radius:20px;
    filter:blur(.3px);
}

.r1{width:18px;height:10px;top:0;}
.r2{width:26px;height:10px;top:18px;}
.r3{width:22px;height:12px;top:42px;}
.r4{width:34px;height:12px;top:65px;}
.r5{width:44px;height:14px;top:92px;}
.r6{width:56px;height:14px;top:120px;}
.r7{width:70px;height:16px;top:148px;}

/* Waves */
.wave{
    position:absolute;
    border-top:2px solid #7ec8ff;
    border-radius:50%;
    opacity:.8;
}

.w1{
    width:110px;
    height:18px;
    left:290px;
    top:380px;
}

.w2{
    width:90px;
    height:16px;
    left:470px;
    top:420px;
}

.w3{
    width:130px;
    height:18px;
    left:620px;
    top:395px;
}

.w4{
    width:85px;
    height:15px;
    left:360px;
    top:455px;
}

/* Island */
.island{
    position:absolute;
    right:0;
    bottom:105px;
    width:310px;
    height:175px;
    background:#06152f;
    clip-path:polygon(
        0% 100%,
        5% 72%,
        16% 80%,
        26% 52%,
        38% 58%,
        49% 30%,
        60% 42%,
        70% 22%,
        82% 34%,
        92% 12%,
        100% 25%,
        100% 100%
    );
}

.island::before{
    content:"";
    position:absolute;
    inset:0;
    background:#112d58;
    clip-path:polygon(
        35% 55%,
        50% 32%,
        60% 42%,
        74% 24%,
        83% 35%,
        66% 47%
    );
    opacity:.45;
}

/* Lighthouse */
.lighthouse{
    position:absolute;
    right:105px;
    bottom:185px;
    width:70px;
    height:180px;
}

/* Tower */
.tower{
    position:absolute;
    bottom:0;
    left:10px;
    width:50px;
    height:145px;
    background:#081a3d;
    clip-path:polygon(
        12% 100%,
        88% 100%,
        72% 0%,
        28% 0%
    );
}

.tower::after{
    content:"";
    position:absolute;
    right:0;
    top:0;
    width:4px;
    height:100%;
    background:rgba(255,255,255,.08);
}

/* Tower Windows */
.window{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:12px;
    height:18px;
    background:#ffd96a;
    border-radius:8px 8px 0 0;
    box-shadow:0 0 10px rgba(255,217,106,.5);
}

.win1{top:25px;}
.win2{top:65px;}
.win3{top:105px;}

/* Lantern Room */
.lantern{
    position:absolute;
    top:0;
    left:8px;
    width:54px;
    height:38px;
    background:#10224b;
    border-radius:4px;
}

.lantern-window{
    position:absolute;
    top:10px;
    width:10px;
    height:12px;
    background:#ffd96a;
    box-shadow:0 0 10px rgba(255,217,106,.8);
}

.lw1{left:8px;}
.lw2{left:22px;}
.lw3{left:36px;}

/* Light Beam */
.beam{
    position:absolute;
    top:10px;
    right:145px;
    width:380px;
    height:220px;
    background:rgba(255,217,106,.14);
    clip-path:polygon(100% 50%, 0 0, 0 100%);
    filter:blur(2px);
    transform:rotate(-6deg);
    transform-origin:right center;
}
</style>
</head>

<body>

<div class="scene">

    <div class="sky"></div>
    <div class="sea"></div>
    <div class="horizon"></div>

    <!-- Moon -->
    <div class="moon"></div>

    <!-- Stars -->
    <div class="star" style="width:2px;height:2px;top:35px;left:40px;"></div>
    <div class="star" style="width:3px;height:3px;top:55px;left:120px;"></div>
    <div class="star" style="width:2px;height:2px;top:25px;left:210px;"></div>
    <div class="star" style="width:1px;height:1px;top:80px;left:310px;"></div>
    <div class="star" style="width:3px;height:3px;top:45px;left:420px;"></div>
    <div class="star" style="width:2px;height:2px;top:90px;left:510px;"></div>
    <div class="star" style="width:1px;height:1px;top:50px;left:620px;"></div>
    <div class="star" style="width:3px;height:3px;top:110px;left:700px;"></div>
    <div class="star" style="width:2px;height:2px;top:35px;left:790px;"></div>
    <div class="star" style="width:2px;height:2px;top:140px;left:850px;"></div>
    <div class="star" style="width:1px;height:1px;top:170px;left:120px;"></div>
    <div class="star" style="width:3px;height:3px;top:180px;left:220px;"></div>
    <div class="star" style="width:2px;height:2px;top:210px;left:370px;"></div>
    <div class="star" style="width:1px;height:1px;top:160px;left:470px;"></div>
    <div class="star" style="width:3px;height:3px;top:230px;left:590px;"></div>
    <div class="star" style="width:2px;height:2px;top:140px;left:660px;"></div>
    <div class="star" style="width:1px;height:1px;top:200px;left:760px;"></div>
    <div class="star" style="width:2px;height:2px;top:250px;left:820px;"></div>
    <div class="star" style="width:3px;height:3px;top:70px;left:880px;"></div>
    <div class="star" style="width:2px;height:2px;top:250px;left:70px;"></div>

    <!-- Birds -->
    <div class="bird b1"></div>
    <div class="bird b2"></div>
    <div class="bird b3"></div>

    <!-- Moon Reflection -->
    <div class="reflection">
        <span class="r1"></span>
        <span class="r2"></span>
        <span class="r3"></span>
        <span class="r4"></span>
        <span class="r5"></span>
        <span class="r6"></span>
        <span class="r7"></span>
    </div>

    <!-- Waves -->
    <div class="wave w1"></div>
    <div class="wave w2"></div>
    <div class="wave w3"></div>
    <div class="wave w4"></div>

    <!-- Light Beam -->
    <div class="beam"></div>

    <!-- Island -->
    <div class="island"></div>

    <!-- Lighthouse -->
    <div class="lighthouse">

        <div class="lantern">
            <div class="lantern-window lw1"></div>
            <div class="lantern-window lw2"></div>
            <div class="lantern-window lw3"></div>
        </div>

        <div class="tower">
            <div class="window win1"></div>
            <div class="window win2"></div>
            <div class="window win3"></div>
        </div>

    </div>

</div>

</body>
</html>
