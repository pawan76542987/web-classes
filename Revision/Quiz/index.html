<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section>
        <img src="BrainRush.png" alt="">
        <div id="important">
            <div class="div1">
                <h1>Test Your Brain</h1>
                <p id="description">Play the timed quiz and boost your knowledge.</p>
            </div>
            <select name="" class="selection">
                <option value="">Select Field</option>
                <option value="17">General Knowledge</option>
                <option value="9">Science</option>
                <option value="21">Sports</option>
            </select>
            <select name="" class="selection">
                <option value="">Select Difficulty</option>
                <option value="">Easy</option>
                <option value="">Medium</option>
                <option value="">Hard</option>
            </select>
            <p id="message"></p>
        </div>
        <button id="start-btn">Start Quiz</button>
    </section>
</body>

</html>
