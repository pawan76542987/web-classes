<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF=8">
    <meta content="viewport" width="device-width, initial-scale=1.0">
    <title>Mini Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="contact-page">
        <div id="left">
            <img src="Screenshot 2026-03-30 at 12.12.29 AM.png" alt="Image">
        </div>
        <div id="right">
            <h1>Contact Us</h1>
            <p id="p5">Explore the future with us. <br>Feel free to get in touch.</p>
            <form>
                <input type="text" id="name" placeholder="Full name">
                <input type="email" id="email" placeholder="E-mail">
                <textarea id="message" placeholder="How can we get better?"></textarea>
                <button type="submit">Send message</button>
                <p id="success-msg"></p>
            </form>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
